name: Weekly Monitor

on:
  schedule:
    # Every Monday 09:00 KST (00:00 UTC). Cron-only event — no untrusted inputs.
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate weekly report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/release-monitor.sh
          {
            echo "## 📊 Weekly release monitor — $(date -u +%Y-%m-%d)"
            echo ""
            echo "Auto-generated by \`.github/workflows/weekly-monitor.yml\`."
            echo ""
            scripts/release-monitor.sh --since 7d --markdown
          } > /tmp/report.md

      - name: Post comment to dogfooding issue (#10)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment 10 --repo "$REPO" --body-file /tmp/report.md
