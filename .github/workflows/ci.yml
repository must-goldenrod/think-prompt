name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile=false
      # Build first so workspace packages can resolve each other's .d.ts
      # during the typecheck pass (agent/worker/dashboard/cli depend on core).
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  extension-package:
    name: Package browser extension (zip)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -F @think-prompt/browser-extension build:prod
      - run: pnpm -F @think-prompt/browser-extension package
      - uses: actions/upload-artifact@v4
        with:
          name: think-prompt-extension
          path: packages/browser-extension/*.zip
          if-no-files-found: error
          retention-days: 30
