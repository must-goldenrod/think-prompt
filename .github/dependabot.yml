version: 2
updates:
  # npm: only patch + minor (no auto major bumps — those need manual review).
  # No groups — each package gets its own PR so we can evaluate individually.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 8
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    labels:
      - ci
