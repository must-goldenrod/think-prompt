<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Think-Prompt</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 16px;
        width: 280px;
        color: #111;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; }
      .label { color: #666; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .on { background: #22c55e; }
      .off { background: #ef4444; }
      button { width: 100%; padding: 8px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 12px; margin-top: 8px; }
      button:hover { background: #f5f5f5; }
      .hint { font-size: 11px; color: #888; margin-top: 8px; }
      a { color: #2563eb; text-decoration: none; }
    </style>
  </head>
  <body>
    <h1>Think-Prompt for Web</h1>
    <div class="row">
      <span class="label">Local agent</span>
      <span id="agent-status"><span class="dot off"></span>checking…</span>
    </div>
    <div class="row">
      <span class="label">Pending</span>
      <span id="pending">0</span>
    </div>
    <div class="row">
      <span class="label">Synced</span>
      <span id="synced">0</span>
    </div>
    <div class="row">
      <span class="label">Stuck (retry cap)</span>
      <span id="poisoned">0</span>
    </div>
    <button id="sync-btn">Sync now</button>
    <button id="options-btn">Settings</button>
    <p class="hint">Your prompts never leave this device. See <a href="../privacy-policy.html" target="_blank">privacy policy</a>.</p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
